<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JobTrail — job application tracker</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="mark">●</span>
      <div>
        <h1>JobTrail</h1>
        <p class="tagline">Paste an Indeed or LinkedIn link — track every application in one place.</p>
      </div>
    </div>
    <form id="add-form" class="add-form" autocomplete="off">
      <input id="add-url" type="url" placeholder="https://www.indeed.com/viewjob?jk=…  or  linkedin.com/jobs/view/…" />
      <button id="add-btn" type="submit">Add job</button>
    </form>
  </header>

  <div id="toast" class="toast" hidden></div>

  <div class="subbar">
    <nav class="filters" id="filters"></nav>
    <div class="toolbar">
      <span class="backup-status" id="backup-status"></span>
      <button id="trash-btn" class="btn-ghost">Trash <span class="count" id="trash-count">0</span></button>
      <button id="export-btn" class="btn-ghost">Export backup</button>
      <label class="btn-ghost import-label">Import
        <input type="file" id="import-file" accept="application/json,.json" hidden />
      </label>
      <button id="backup-btn" class="btn-ghost">Back up now</button>
    </div>
  </div>

  <main class="layout">
    <section class="list-pane">
      <ul id="job-list" class="job-list"></ul>
      <div id="empty-list" class="empty-list" hidden>
        <p>No jobs yet.</p>
        <p class="muted">Paste a job link above to get started.</p>
      </div>
    </section>

    <section class="detail-pane" id="detail-pane">
      <div class="detail-empty" id="detail-empty">
        <p class="muted">Select a job to see and edit its details.</p>
      </div>
      <div class="detail" id="detail" hidden></div>
    </section>
  </main>

  <template id="detail-template">
    <div class="detail-head">
      <div>
        <h2 class="d-title"></h2>
        <p class="d-company"></p>
      </div>
      <div class="detail-actions">
        <a class="d-source btn-ghost" target="_blank" rel="noopener">Open original ↗</a>
        <button class="d-md btn-ghost">Markdown</button>
        <button class="d-delete btn-danger">Delete</button>
      </div>
    </div>

    <div class="d-meta chips"></div>

    <div class="tracker">
      <div class="field">
        <label>Status</label>
        <select class="d-status"></select>
      </div>
      <div class="field">
        <label>Date applied</label>
        <input type="date" class="d-applied" />
      </div>
      <div class="field">
        <label>Follow-up</label>
        <input type="date" class="d-followup" />
      </div>
      <div class="field">
        <label>Salary expectation</label>
        <input type="text" class="d-salexp" placeholder="$85,000" />
      </div>
      <div class="field">
        <label>Contact</label>
        <input type="text" class="d-contact" placeholder="Recruiter name / email" />
      </div>
      <div class="field">
        <label>Interest</label>
        <div class="stars d-stars"></div>
      </div>
    </div>

    <div class="files">
      <div class="file-slot" data-kind="resume">
        <label>Resume</label>
        <div class="file-row"></div>
      </div>
      <div class="file-slot" data-kind="cover_letter">
        <label>Cover letter</label>
        <div class="file-row"></div>
      </div>
    </div>

    <div class="field">
      <label>Notes</label>
      <textarea class="d-notes" rows="4" placeholder="Application notes, interview prep, links…"></textarea>
    </div>

    <details class="desc">
      <summary>Job description</summary>
      <div class="desc-body markdown"></div>
    </details>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
